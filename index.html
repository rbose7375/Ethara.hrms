<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRMS | ETHARA.ai</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const root = document.getElementById('root');

      const renderBootError = (error) => {
        root.innerHTML = '';

        const notice = document.createElement('div');
        notice.style.cssText = [
          'max-width: 720px',
          'margin: 4rem auto',
          'padding: 1.5rem',
          'border: 1px solid #e5e7eb',
          'border-radius: 16px',
          'background: #ffffff',
          'box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08)',
          'font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          'color: #111827',
          'line-height: 1.6',
        ].join(';');
        notice.innerHTML = `
          <h1 style="margin: 0 0 0.75rem; font-size: 1.5rem;">Unable to start the app</h1>
          <p style="margin: 0 0 0.75rem;">
            This frontend must be served through Vite during development or from the built
            <code>dist</code> output in production.
          </p>
          <p style="margin: 0;">
            Run <code>npm run dev</code> for development, or run <code>npm run build</code> and
            serve the <code>dist</code> folder.
          </p>
        `;

        root.appendChild(notice);
        console.error(
          'Failed to start the app. Use "npm run dev" during development or serve the "dist" folder after building.',
          error,
        );
      };

      import('/src/main.js').catch(renderBootError);
    </script>
  </body>
</html>
